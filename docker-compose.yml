version: '3.8'

services:
  fateh-erp:
    build: .
    container_name: fateh-erp-app
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      - NODE_ENV=production
      - PORT=5050
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-XXRTFghJ00?@dfg}
      - JWT_SECRET=${JWT_SECRET:-fateh-erp-super-secret-key-2026}
    volumes:
      - ./data/leads.json:/app/leads.json
      - ./data/settings.json:/app/settings.json
      - ./data/testimonials.json:/app/testimonials.json
      - ./data/users.json:/app/users.json
      - ./data/analytics.json:/app/analytics.json
      - ./data/pricing.json:/app/pricing.json
